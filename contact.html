<meta name="referrer" content="strict-origin-when-cross-origin" />
<!-- フォーム送信先として Formspree を許可（frame-ancestors でクリックジャッキング防止） -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           base-uri 'self';
           object-src 'none';
           frame-ancestors 'none';
           form-action 'self' https://formspree.io;
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src 'self' https://fonts.gstatic.com;
           img-src 'self' data: blob:;
           script-src 'self';
           connect-src 'self' https://formspree.io;" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/style.css" />

<!-- ============ お問い合わせフォーム ============ -->
<main class="content-wrapper">
<section class="section formsec" id="form">
  <div class="wrap">
    <div class="sec-head">
      <span class="en">CONTACT</span>
      <h2 class="ja">お問い合わせ</h2>
    </div>
    <p class="form__lead">
      下記フォームに必要事項をご記入の上、お問い合わせください。<br />
      <span class="form__note">＊ は必須項目です。担当より追ってご連絡いたします。</span>
    </p>

    <form class="cform" id="contactForm" action="https://formspree.io/f/xkoaqreg" method="POST">
      <div class="cform__row">
        <label for="f-name">お名前 <span class="req">＊</span></label>
        <input type="text" id="f-name" name="name" autocomplete="name" required placeholder="山田 太郎" />
      </div>
      <div class="cform__row">
        <label for="f-company">会社名・団体名</label>
        <input type="text" id="f-company" name="company" autocomplete="organization" placeholder="株式会社○○" />
      </div>
      <div class="cform__row">
        <label for="f-email">メールアドレス <span class="req">＊</span></label>
        <input type="email" id="f-email" name="email" autocomplete="email" required placeholder="example@example.com" />
      </div>
      <div class="cform__row">
        <label for="f-message">お問い合わせ内容 <span class="req">＊</span></label>
        <textarea id="f-message" name="message" rows="7" required placeholder="お問い合わせ内容をご記入ください。"></textarea>
      </div>

      <!-- Formspree 設定：件名・スパム対策（honeypot） -->
      <input type="hidden" name="_subject" value="【公式サイト】お問い合わせ" />
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" class="cform__gotcha" />

      <div class="cform__submit">
        <button type="submit" class="btn btn--primary" id="formSubmit">送信する</button>
      </div>

      <p class="cform__status" id="formStatus" role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
</main>

      <div class="row"><dt>Mail</dt><dd><a href="mailto:p.forward.2005@gmail.com">p.forward.2005@gmail.com</a></dd></div>
    </dl>
  </div>
  <p class="copy">© 2026　株式会社 P.FORWARD</p>
</footer>
